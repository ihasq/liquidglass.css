<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidGlass E2E Test Suite</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #test-output {
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }
    .test-element {
      width: 200px;
      height: 150px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      margin: 10px;
      display: inline-block;
    }
    .test-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }
    #visual-tests {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1 style="color: white;">LiquidGlass E2E Test Suite</h1>

  <div id="test-output">Initializing tests...</div>

  <div id="visual-tests">
    <h3 style="color: white; margin-top: 0;">Visual Test Elements</h3>
    <div class="test-container">
      <div id="test-el-1" class="test-element"></div>
      <div id="test-el-2" class="test-element"></div>
      <div id="test-el-3" class="test-element"></div>
      <div id="test-el-4" class="test-element" style="--glass-refraction: 80;"></div>
    </div>
  </div>

  <script type="module">
    // ========================================================================
    // E2E Test Framework
    // ========================================================================

    const results = {
      suites: [],
      passed: 0,
      failed: 0,
      skipped: 0,
      startTime: Date.now(),
    };

    let currentSuite = null;

    function suite(name) {
      currentSuite = { name, tests: [], passed: 0, failed: 0 };
      results.suites.push(currentSuite);
      console.log(`[SUITE] ${name}`);
    }

    function test(name, fn) {
      const testResult = { name, passed: false, error: null, duration: 0 };
      const start = performance.now();

      try {
        const result = fn();
        if (result instanceof Promise) {
          return result.then(() => {
            testResult.passed = true;
            testResult.duration = performance.now() - start;
            currentSuite.tests.push(testResult);
            currentSuite.passed++;
            results.passed++;
            console.log(`[PASS] ${currentSuite.name} > ${name} (${testResult.duration.toFixed(1)}ms)`);
          }).catch(err => {
            testResult.error = err.message;
            testResult.duration = performance.now() - start;
            currentSuite.tests.push(testResult);
            currentSuite.failed++;
            results.failed++;
            console.log(`[FAIL] ${currentSuite.name} > ${name}: ${err.message}`);
          });
        }
        testResult.passed = true;
        testResult.duration = performance.now() - start;
        currentSuite.tests.push(testResult);
        currentSuite.passed++;
        results.passed++;
        console.log(`[PASS] ${currentSuite.name} > ${name} (${testResult.duration.toFixed(1)}ms)`);
      } catch (err) {
        testResult.error = err.message;
        testResult.duration = performance.now() - start;
        currentSuite.tests.push(testResult);
        currentSuite.failed++;
        results.failed++;
        console.log(`[FAIL] ${currentSuite.name} > ${name}: ${err.message}`);
      }
    }

    function skip(name, reason = '') {
      currentSuite.tests.push({ name, passed: false, skipped: true, reason });
      results.skipped++;
      console.log(`[SKIP] ${currentSuite.name} > ${name}${reason ? `: ${reason}` : ''}`);
    }

    function assert(condition, message = 'Assertion failed') {
      if (!condition) throw new Error(message);
    }

    function assertEqual(actual, expected, message = '') {
      if (actual !== expected) {
        throw new Error(`${message} Expected ${expected}, got ${actual}`);
      }
    }

    function assertApprox(actual, expected, epsilon = 0.001, message = '') {
      if (Math.abs(actual - expected) > epsilon) {
        throw new Error(`${message} Expected ~${expected}, got ${actual} (epsilon: ${epsilon})`);
      }
    }

    function assertDefined(value, message = 'Expected value to be defined') {
      if (value === undefined || value === null) {
        throw new Error(message);
      }
    }

    function assertThrows(fn, message = 'Expected function to throw') {
      try {
        fn();
        throw new Error(message);
      } catch (e) {
        if (e.message === message) throw e;
      }
    }

    // ========================================================================
    // Import Library
    // ========================================================================

    const LG = await import('/src/index.ts');

    const outputEl = document.getElementById('test-output');
    outputEl.textContent = 'Running tests...\n';

    // ========================================================================
    // Test Suites
    // ========================================================================

    // ------------------------------------------------------------------------
    // 1. Environment & Exports
    // ------------------------------------------------------------------------
    suite('Environment & Exports');

    test('__DEV__ is defined', () => {
      assertDefined(LG.__DEV__, '__DEV__ should be defined');
    });

    test('__VERSION__ is defined', () => {
      assertDefined(LG.__VERSION__, '__VERSION__ should be defined');
    });

    test('lgc_dev is accessible', () => {
      assertDefined(LG.lgc_dev, 'lgc_dev should be defined');
    });

    // ------------------------------------------------------------------------
    // 2. Parameter Schema
    // ------------------------------------------------------------------------
    suite('Parameter Schema');

    test('PARAMETERS is defined with all parameters', () => {
      assertDefined(LG.PARAMETERS);
      assert(Object.keys(LG.PARAMETERS).length >= 10, 'Should have at least 10 parameters');
    });

    test('PARAMETER_NAMES matches PARAMETERS keys', () => {
      assertEqual(LG.PARAMETER_NAMES.length, Object.keys(LG.PARAMETERS).length);
    });

    test('DEFAULT_PARAMS has all parameters', () => {
      for (const name of LG.PARAMETER_NAMES) {
        assertDefined(LG.DEFAULT_PARAMS[name], `DEFAULT_PARAMS.${name} should be defined`);
      }
    });

    test('getCSSPropertyName returns correct format', () => {
      const name = LG.getCSSPropertyName('refraction');
      assert(name.startsWith('--glass-'), `Should start with --glass-, got ${name}`);
    });

    test('getAllCSSPropertyNames returns all properties', () => {
      const names = LG.getAllCSSPropertyNames();
      assertEqual(Object.keys(names).length, LG.PARAMETER_NAMES.length);
    });

    test('getParameterByCSSProperty finds parameters', () => {
      const result = LG.getParameterByCSSProperty('glass-refraction');
      assertDefined(result, 'Should find refraction parameter');
      assertEqual(result.name, 'refraction');
    });

    test('validateNumericParam clamps values', () => {
      const clamped = LG.validateNumericParam('refraction', 150);
      assertEqual(clamped, 100, 'Should clamp to max');

      const clampedLow = LG.validateNumericParam('refraction', -10);
      assertEqual(clampedLow, 0, 'Should clamp to min');
    });

    test('validateEnumParam validates enum values', () => {
      const valid = LG.validateEnumParam('displacementRenderer', 'wasm');
      assertEqual(valid, 'wasm');

      const invalid = LG.validateEnumParam('displacementRenderer', 'invalid');
      assertEqual(invalid, undefined);
    });

    // ------------------------------------------------------------------------
    // 3. Math - Interpolation
    // ------------------------------------------------------------------------
    suite('Math - Interpolation');

    test('smoothstep returns 0 at edge0', () => {
      assertApprox(LG.smoothstep(0, 1, 0), 0);
    });

    test('smoothstep returns 1 at edge1', () => {
      assertApprox(LG.smoothstep(0, 1, 1), 1);
    });

    test('smoothstep returns 0.5 at midpoint', () => {
      assertApprox(LG.smoothstep(0, 1, 0.5), 0.5);
    });

    test('smootherstep returns 0 at edge0', () => {
      assertApprox(LG.smootherstep(0, 1, 0), 0);
    });

    test('smootherstep returns 1 at edge1', () => {
      assertApprox(LG.smootherstep(0, 1, 1), 1);
    });

    test('smootherstep returns 0.5 at midpoint', () => {
      assertApprox(LG.smootherstep(0, 1, 0.5), 0.5);
    });

    // ------------------------------------------------------------------------
    // 4. Math - Profiles
    // ------------------------------------------------------------------------
    suite('Math - Profiles');

    test('getProfile returns profile function for circle', () => {
      const profile = LG.getProfile('circle');
      assertDefined(profile);
      const result = profile(0);
      assertDefined(result.height);
      assertDefined(result.slope);
    });

    test('getProfile returns profile function for squircle', () => {
      const profile = LG.getProfile('squircle');
      assertDefined(profile);
    });

    test('getProfile returns profile function for parabolic', () => {
      const profile = LG.getProfile('parabolic');
      assertDefined(profile);
    });

    test('getProfile returns profile function for concave', () => {
      const profile = LG.getProfile('concave');
      assertDefined(profile);
    });

    test('getProfile returns profile function for lip', () => {
      const profile = LG.getProfile('lip');
      assertDefined(profile);
    });

    test('circle profile: height=1 at center, 0 at edge', () => {
      const profile = LG.getProfile('circle');
      assertApprox(profile(0).height, 1, 0.01);
      assertApprox(profile(1).height, 0, 0.01);
    });

    // ------------------------------------------------------------------------
    // 5. Math - Snell's Law
    // ------------------------------------------------------------------------
    suite('Math - Snell\'s Law');

    test('calculateRefraction returns valid result', () => {
      const result = LG.calculateRefraction(Math.PI / 4);
      assertDefined(result);
      assertDefined(result.angle);
      assertDefined(result.displacement);
    });

    test('calculateRefraction handles normal incidence', () => {
      const result = LG.calculateRefraction(0);
      assertApprox(result.angle, 0, 0.01, 'Normal incidence should have zero refraction');
    });

    test('calculateDisplacementVector returns dx,dy displacement', () => {
      const result = LG.calculateDisplacementVector(0.5, Math.PI / 4, 0.3, 1.5, 1.0);
      assertDefined(result.dx);
      assertDefined(result.dy);
    });

    // ------------------------------------------------------------------------
    // 6. Displacement Map Generation - Canvas/WASM
    // ------------------------------------------------------------------------
    suite('Displacement Map Generation');

    test('generateDisplacementMap returns canvas and dataUrl', () => {
      const result = LG.generateDisplacementMap({
        width: 100,
        height: 80,
        profile: 'squircle',
        refractiveIndex: 1.5,
        thickness: 1.0,
        refractionLevel: 0.8,
        borderRadius: 10,
      });
      assertDefined(result.canvas);
      assertDefined(result.dataUrl);
      assert(result.dataUrl.startsWith('data:image/png'), 'Should be PNG data URL');
    });

    test('generateSquircleDisplacementMap returns valid result', () => {
      const result = LG.generateSquircleDisplacementMap(100, 80, 1.5, 0.8, 10);
      assertDefined(result.canvas);
      assertDefined(result.dataUrl);
    });

    test('isWasmSimdSupported returns boolean', () => {
      const supported = LG.isWasmSimdSupported();
      assert(typeof supported === 'boolean');
    });

    test('generateWasmDisplacementMap works if supported', async () => {
      if (!LG.isWasmSimdSupported()) {
        skip('WASM SIMD not supported');
        return;
      }
      try {
        const result = await LG.generateWasmDisplacementMap({
          width: 100,
          height: 80,
          borderRadius: 10,
          edgeWidthRatio: 0.3,
        });
        assertDefined(result.canvas);
        assertDefined(result.dataUrl);
      } catch (e) {
        // WASM may have issues in headless browser
        skip('WASM execution failed: ' + e.message);
      }
    });

    // ------------------------------------------------------------------------
    // 7. Displacement Map Generation - WebGL2
    // ------------------------------------------------------------------------
    suite('Displacement Map - WebGL2');

    test('isWebGL2Supported returns boolean', () => {
      const supported = LG.isWebGL2Supported();
      assert(typeof supported === 'boolean');
    });

    test('generateWebGL2DisplacementMap works if supported', async () => {
      if (!LG.isWebGL2Supported()) {
        skip('WebGL2 not supported');
        return;
      }
      try {
        const result = await LG.generateWebGL2DisplacementMap({
          width: 100,
          height: 80,
          borderRadius: 10,
          edgeWidthRatio: 0.3,
        });
        assertDefined(result.canvas);
        assertDefined(result.dataUrl);
      } catch (e) {
        // WebGL2 may have issues in headless browser
        skip('WebGL2 execution failed: ' + e.message);
      }
    });

    // ------------------------------------------------------------------------
    // 8. Displacement Map Generation - WebGPU
    // ------------------------------------------------------------------------
    suite('Displacement Map - WebGPU');

    test('isWebGPUSupported returns boolean', () => {
      const supported = LG.isWebGPUSupported();
      assert(typeof supported === 'boolean');
    });

    test('generateWebGPUDisplacementMap works if supported', async () => {
      if (!LG.isWebGPUSupported()) {
        skip('WebGPU not supported');
        return;
      }
      try {
        const result = await LG.generateWebGPUDisplacementMap({
          width: 100,
          height: 80,
          borderRadius: 10,
          edgeWidthRatio: 0.3,
        });
        assertDefined(result.canvas);
        assertDefined(result.dataUrl);
      } catch (e) {
        // WebGPU may have issues in headless browser
        skip('WebGPU execution failed: ' + e.message);
      }
    });

    // ------------------------------------------------------------------------
    // 9. Specular Highlight
    // ------------------------------------------------------------------------
    suite('Specular Highlight');

    test('generateSpecularMap returns canvas and dataUrl', () => {
      const result = LG.generateSpecularMap({
        width: 100,
        height: 80,
        borderRadius: 10,
        lightAngle: -Math.PI / 3,  // -60 degrees in radians
        shininess: 8,
        glossAlpha: 0.8,
      });
      assertDefined(result.canvas);
      assertDefined(result.dataUrl);
      assert(result.dataUrl.startsWith('data:image/png'), 'Should be PNG data URL');
    });

    test('generateSpecularMap with default glossAlpha', () => {
      const result = LG.generateSpecularMap({
        width: 100,
        height: 80,
        borderRadius: 10,
        lightAngle: 0,
        shininess: 4,
      });
      assertDefined(result.canvas);
      assertDefined(result.dataUrl);
    });

    // ------------------------------------------------------------------------
    // 10. SVG Filter Creation
    // ------------------------------------------------------------------------
    suite('SVG Filter Creation');

    test('createLiquidGlassFilter creates filter result object', () => {
      const result = LG.createLiquidGlassFilter({
        displacementMapUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
        specularMapUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
        width: 100,
        height: 80,
        scale: 50,
      });
      assertDefined(result);
      assertDefined(result.filterId);
      assertDefined(result.filterUrl);
      assertDefined(result.cleanup);
      assert(result.filterUrl.includes(result.filterId), 'filterUrl should contain filterId');
    });

    // ------------------------------------------------------------------------
    // 11. CSS Bridge
    // ------------------------------------------------------------------------
    suite('CSS Bridge');

    test('generateLiquidGlassCssClass returns CSS string', () => {
      const css = LG.generateLiquidGlassCssClass('.test-class', 'test-filter-id');
      assert(typeof css === 'string');
      assert(css.includes('.test-class'), 'Should include selector');
      assert(css.includes('backdrop-filter'), 'Should include backdrop-filter');
    });

    test('applyLiquidGlassCss applies style to element', () => {
      const el = document.createElement('div');
      LG.applyLiquidGlassCss(el, { filterUrl: 'url(#test-filter)' });
      const style = el.style.cssText;
      assert(style.includes('backdrop-filter') || style.includes('blur'), 'Should apply backdrop-filter or blur');
    });

    // ------------------------------------------------------------------------
    // 12. CSS Property Engine
    // ------------------------------------------------------------------------
    suite('CSS Property Engine');

    test('defineProperties registers properties', () => {
      // This may throw if properties already exist, which is fine
      try {
        LG.defineProperties({
          'test-prop-e2e': {
            syntax: '<number>',
            inherits: true,
            initialValue: '0',
          }
        });
        assert(true);
      } catch (e) {
        // Property may already exist
        assert(true);
      }
    });

    test('createEngine creates engine instance', () => {
      const engine = LG.createEngine('test-engine-e2e', {
        'test-engine-prop': {
          syntax: '<number>',
          inherits: true,
          initialValue: '0',
          callback: () => {},
        }
      });
      assertDefined(engine);
    });

    test('CSSPropertyEngine class exists', () => {
      assertDefined(LG.CSSPropertyEngine);
    });

    // ------------------------------------------------------------------------
    // 13. FilterManager
    // ------------------------------------------------------------------------
    suite('FilterManager');

    test('FilterManager class exists', () => {
      assertDefined(LG.FilterManager);
    });

    test('FilterManager can be instantiated', () => {
      const manager = new LG.FilterManager();
      assertDefined(manager);
    });

    test('getDefaultManager returns singleton', () => {
      const manager1 = LG.getDefaultManager();
      const manager2 = LG.getDefaultManager();
      assertEqual(manager1, manager2);
    });

    test('supportsBackdropSvgFilter returns boolean', () => {
      const supported = LG.supportsBackdropSvgFilter();
      assert(typeof supported === 'boolean');
    });

    test('FilterManager.attach attaches element', () => {
      const manager = new LG.FilterManager();
      const el = document.getElementById('test-el-1');
      manager.attach(el, { refraction: 50, thickness: 30 });
      // Should not throw
      assert(true);
      manager.detach(el);
    });

    test('FilterManager.update updates parameters', () => {
      const manager = new LG.FilterManager();
      const el = document.getElementById('test-el-2');
      manager.attach(el, { refraction: 50 });
      manager.update(el, { refraction: 80, thickness: 40 });
      // Should not throw
      assert(true);
      manager.detach(el);
    });

    test('FilterManager applies saturation primitive', async () => {
      if (!LG.supportsBackdropSvgFilter()) {
        assert(true, 'SVG backdrop filter unsupported in this browser');
        return;
      }

      const manager = new LG.FilterManager();
      const filtersBefore = document.querySelectorAll('svg defs filter').length;
      const el = document.createElement('div');
      el.style.width = '120px';
      el.style.height = '80px';
      el.style.borderRadius = '12px';
      document.body.appendChild(el);

      manager.attach(el, { ...LG.DEFAULT_PARAMS, saturation: 45 });

      await new Promise(r => setTimeout(r, 200));

      const filters = Array.from(document.querySelectorAll('svg defs filter'));
      const filter = filters[filtersBefore];
      assertDefined(filter, 'Filter should be created');
      const saturate = filter.querySelector('feColorMatrix[type="saturate"]');
      assertDefined(saturate, 'Saturation primitive should exist');
      assertEqual(saturate.getAttribute('values'), '1.45');

      manager.detach(el);
      el.remove();
    });

    test('FilterManager queues final render during rapid updates', async () => {
      if (!LG.supportsBackdropSvgFilter()) {
        assert(true, 'SVG backdrop filter unsupported in this browser');
        return;
      }

      const manager = new LG.FilterManager({ minEncodeInterval: 0, maxEncodeInterval: 0 });
      const filtersBefore = document.querySelectorAll('svg defs filter').length;
      const el = document.createElement('div');
      el.style.width = '120px';
      el.style.height = '80px';
      el.style.borderRadius = '12px';
      document.body.appendChild(el);

      manager.attach(el, { ...LG.DEFAULT_PARAMS, refraction: 0 });

      for (let i = 0; i < 20; i++) {
        manager.update(el, { refraction: i * 5 });
      }

      await new Promise(r => setTimeout(r, 500));

      const filters = Array.from(document.querySelectorAll('svg defs filter'));
      const filter = filters[filtersBefore];
      assertDefined(filter, 'Filter should be created');
      const displacement = filter.querySelector('feDisplacementMap[result="r"]');
      assertDefined(displacement, 'Displacement primitive should exist');
      assertEqual(displacement.getAttribute('scale'), '190');

      manager.detach(el);
      el.remove();
    });

    test('FilterManager.detach removes filter', () => {
      const manager = new LG.FilterManager();
      const el = document.getElementById('test-el-3');
      manager.attach(el, { refraction: 50 });
      manager.detach(el);
      // Should not throw
      assert(true);
    });

    test('preloadWasm preloads WASM module', async () => {
      try {
        await LG.preloadWasm();
        assert(true);
      } catch (e) {
        // May fail if WASM not supported
        assert(true);
      }
    });

    test('preloadWebGL2 initializes WebGL2 context', async () => {
      try {
        await LG.preloadWebGL2();
        assert(true);
      } catch (e) {
        // May fail if WebGL2 not supported
        assert(true);
      }
    });

    test('preloadWebGPU initializes WebGPU context', async () => {
      try {
        await LG.preloadWebGPU();
        assert(true);
      } catch (e) {
        // May fail if WebGPU not supported
        assert(true);
      }
    });

    // ------------------------------------------------------------------------
    // 14. CSS Properties Driver
    // ------------------------------------------------------------------------
    suite('CSS Properties Driver');

    test('initCSSProperties initializes CSS properties driver', async () => {
      try {
        await LG.initCSSProperties();
        assert(true);
      } catch (e) {
        // May already be initialized
        assert(true);
      }
    });

    test('initLiquidGlassCSS is defined', () => {
      assertDefined(LG.initLiquidGlassCSS);
    });

    test('getCSSEngine returns engine instance after init', async () => {
      await LG.initCSSProperties();
      const engine = LG.getCSSEngine();
      assertDefined(engine, 'Engine should be defined after initialization');
    });

    test('getCSSManager returns manager instance', () => {
      const manager = LG.getCSSManager();
      assertDefined(manager);
    });

    test('CSS properties apply effect to element', async () => {
      await LG.initCSSProperties();

      const el = document.getElementById('test-el-4');
      el.style.setProperty('--glass-refraction', '70');
      el.style.setProperty('--glass-thickness', '50');

      // Wait for observation
      await new Promise(r => setTimeout(r, 200));

      // Check that some style was applied
      assert(true, 'CSS property application did not throw');
    });

    // ------------------------------------------------------------------------
    // 15. Visual Rendering Tests
    // ------------------------------------------------------------------------
    suite('Visual Rendering');

    test('Filter renders without visual artifacts', async () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '150px';
      el.style.height = '100px';
      el.style.borderRadius = '15px';
      el.style.background = 'rgba(255,255,255,0.2)';
      document.body.appendChild(el);

      manager.attach(el, {
        refraction: 60,
        thickness: 40,
        gloss: 50,
        softness: 10,
      });

      // Wait for render
      await new Promise(r => setTimeout(r, 200));

      // Check element is still in DOM and visible
      assert(document.body.contains(el), 'Element should be in DOM');
      assert(el.offsetWidth > 0, 'Element should have width');

      manager.detach(el);
      el.remove();
    });

    test('Multiple elements can have different parameters', async () => {
      const manager = new LG.FilterManager();

      const el1 = document.createElement('div');
      const el2 = document.createElement('div');

      [el1, el2].forEach(el => {
        el.style.width = '100px';
        el.style.height = '80px';
        el.style.borderRadius = '10px';
        document.body.appendChild(el);
      });

      manager.attach(el1, { refraction: 30 });
      manager.attach(el2, { refraction: 80 });

      await new Promise(r => setTimeout(r, 100));

      assert(true, 'Multiple elements attached without error');

      manager.detach(el1);
      manager.detach(el2);
      el1.remove();
      el2.remove();
    });

    test('Resize triggers re-render', async () => {
      const manager = new LG.FilterManager();

      const el = document.createElement('div');
      el.style.width = '100px';
      el.style.height = '80px';
      el.style.borderRadius = '10px';
      el.style.transition = 'none';
      document.body.appendChild(el);

      manager.attach(el, { refraction: 50 });

      await new Promise(r => setTimeout(r, 100));

      // Resize element
      el.style.width = '200px';
      el.style.height = '150px';

      // Wait for ResizeObserver
      await new Promise(r => setTimeout(r, 300));

      assert(true, 'Resize handled without error');

      manager.detach(el);
      el.remove();
    });

    // ------------------------------------------------------------------------
    // 16. Edge Cases & Error Handling
    // ------------------------------------------------------------------------
    suite('Edge Cases & Error Handling');

    test('Zero-size element handles gracefully', () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '0';
      el.style.height = '0';
      document.body.appendChild(el);

      try {
        manager.attach(el, { refraction: 50 });
        assert(true);
      } catch (e) {
        assert(true, 'May throw for zero-size element');
      }

      manager.detach(el);
      el.remove();
    });

    test('Detach non-attached element is safe', () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');

      // Should not throw
      manager.detach(el);
      assert(true);
    });

    test('Double attach is handled', () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '100px';
      el.style.height = '80px';
      document.body.appendChild(el);

      manager.attach(el, { refraction: 50 });
      manager.attach(el, { refraction: 70 }); // Should update or no-op

      assert(true, 'Double attach handled');

      manager.detach(el);
      el.remove();
    });

    test('Invalid parameter values are clamped', () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '100px';
      el.style.height = '80px';
      document.body.appendChild(el);

      // Should clamp to valid range
      manager.attach(el, {
        refraction: 999,  // Should clamp to 100
        thickness: -50,   // Should clamp to 0
      });

      assert(true, 'Invalid params handled');

      manager.detach(el);
      el.remove();
    });

    test('Very large border radius is handled', () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '100px';
      el.style.height = '80px';
      el.style.borderRadius = '999px'; // Larger than element
      document.body.appendChild(el);

      manager.attach(el, { refraction: 50 });

      assert(true, 'Large border radius handled');

      manager.detach(el);
      el.remove();
    });

    // ------------------------------------------------------------------------
    // 17. Memory & Performance
    // ------------------------------------------------------------------------
    suite('Memory & Performance');

    test('Rapid attach/detach does not leak', async () => {
      const manager = new LG.FilterManager();
      const el = document.createElement('div');
      el.style.width = '100px';
      el.style.height = '80px';
      document.body.appendChild(el);

      for (let i = 0; i < 10; i++) {
        manager.attach(el, { refraction: 50 + i });
        manager.detach(el);
      }

      assert(true, 'Rapid attach/detach completed');
      el.remove();
    });

    test('Many elements can be managed', async () => {
      const manager = new LG.FilterManager();
      const elements = [];

      for (let i = 0; i < 5; i++) {
        const el = document.createElement('div');
        el.style.width = '80px';
        el.style.height = '60px';
        el.style.borderRadius = '8px';
        document.body.appendChild(el);
        elements.push(el);
        manager.attach(el, { refraction: 30 + i * 10 });
      }

      await new Promise(r => setTimeout(r, 200));

      for (const el of elements) {
        manager.detach(el);
        el.remove();
      }

      assert(true, 'Many elements managed');
    });

    // ========================================================================
    // Finalize
    // ========================================================================

    results.duration = Date.now() - results.startTime;

    // Output summary
    console.log('[SUMMARY]', JSON.stringify({
      passed: results.passed,
      failed: results.failed,
      skipped: results.skipped,
      total: results.passed + results.failed + results.skipped,
      duration: results.duration,
      suites: results.suites.map(s => ({
        name: s.name,
        passed: s.passed,
        failed: s.failed,
      })),
    }));

    // Update UI
    outputEl.textContent = `Tests Complete\n\nPassed: ${results.passed}\nFailed: ${results.failed}\nSkipped: ${results.skipped}\nDuration: ${results.duration}ms\n\n`;

    if (results.failed > 0) {
      outputEl.textContent += 'Failed tests:\n';
      for (const suite of results.suites) {
        for (const test of suite.tests) {
          if (!test.passed && !test.skipped) {
            outputEl.textContent += `  - ${suite.name} > ${test.name}: ${test.error}\n`;
          }
        }
      }
    }

    // Signal completion
    console.log('[COMPLETE]');
  </script>
